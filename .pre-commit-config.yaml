default_language_version:
  python: python3.12

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-ast
  - id: check-case-conflict
  - id: check-json
  - id: check-merge-conflict
  - id: check-toml
  - id: check-yaml
  - id: debug-statements
  - id: detect-private-key
  - id: end-of-file-fixer
  - id: check-symlinks
  - id: trailing-whitespace

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
  - id: pyupgrade
    args: [--py312-plus]

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.2
  hooks:
  - id: ruff
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format
    args: [--check]

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
  - id: codespell
    args: [-I, .codespellignore]
    exclude: >
              (?x)^(
                  .*\.json|
                  .*\.lock|
                  .*\.pyc|
                  \.tox|
                  .*\.toml
              )$

- repo: https://github.com/python-poetry/poetry
  rev: '2.3.2'
  hooks:
  - id: poetry-check

- repo: local
  hooks:
  - id: no-commit-to-master
    name: prevent direct commits to master
    language: system
    entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "master" ]; then echo "Direct commits to master are not allowed. Use a feature branch."; exit 1; fi'
    pass_filenames: false
    always_run: true
