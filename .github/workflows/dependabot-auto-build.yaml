name: Auto GCB run for Dependabot PRs

on:
  pull_request:
    types: [opened]

jobs:
  vm_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check for GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "GitHub CLI (gh) is not installed. Exiting."
            exit 1
          fi

  auto_gcbrun:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: vm_checks

    if: github.actor == 'dependabot[bot]'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Comment '/gcbrun' on Dependabot PRs
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body '/gcbrun'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
