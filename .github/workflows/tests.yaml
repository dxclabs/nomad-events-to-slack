name: tests

on:
  workflow_run:
    workflows: ["ruff"]
    types:
      - completed

jobs:
  pytests:

    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'skipped' }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: [3.12.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: set pythonpath
        run: |
          echo "PYTHONPATH=.:./tests" >> $GITHUB_ENV

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system --requirements requirements.txt
          uv pip install --system --requirements requirements.tests.txt

      # - run: tox

      - name: Run tests in tests/
        run: pytest tests/

      # - name: Run tests embedded in docstrings
      #   run: pytest --doctest-modules src/
